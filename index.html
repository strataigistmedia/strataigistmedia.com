<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StratAIgist Media — Conseil stratégique IA pour dirigeants</title>
<meta name="description" content="StratAIgist Media accompagne les leaders d'entreprise dans leur transformation IA avec clarté, expertise et humanité. Conseil stratégique, diagnostic IA, formations et contenu média.">
<meta name="keywords" content="IA, intelligence artificielle, stratégie, conseil, dirigeants, transformation numérique, StratAIgist">
<meta property="og:title" content="StratAIgist Media — Votre écosystème stratégique pour naviguer l'ère de l'IA">
<meta property="og:description" content="Nous accompagnons les leaders d'entreprise dans leur transformation IA avec clarté, expertise et humanité.">
<meta property="og:image" content="logo-square.jpg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   STRATAIGIST MEDIA — PROTOTYPE V2
   Inspired by: NVIDIA hero (frosted glass),
   Leeroy.ca (immersive photo backgrounds),
   Insphic (natural, organic feel)
   ═══════════════════════════════════════════ */

:root {
  --forest: #354a40;
  --forest-deep: #2a3a30;
  --cream: #faf5ec;
  --cream-soft: #f5efe5;
  --gold: #c9994d;
  --gold-soft: #d4ad6a;
  --gold-muted: #bfa87a;
  --sage: #7a9e8e;
  --sage-soft: #92b3a3;
  --mint: #c8ddd3;
  --white: #ffffff;
  --noir: #1c1917;
  --beige: #ddd4c6;
  --beige-soft: #e8e0d4;
  --warm-gray: #a89e92;
  --teal: #6b8a84;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Inter',sans-serif;
  font-weight:300;
  color:var(--forest);
  background:var(--cream);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ─── NAVIGATION ─── */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  padding:20px 40px;
  display:flex; align-items:center; justify-content:space-between;
  transition:all .6s cubic-bezier(.22,1,.36,1);
  background:rgba(42,58,48,.85);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.nav.scrolled {
  background:rgba(42,58,48,.95);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  padding:14px 40px;
  box-shadow:0 2px 20px rgba(0,0,0,.15);
}
.nav.scrolled .nav-link { color:rgba(250,245,236,.75); }
.nav.scrolled .nav-link:hover, .nav.scrolled .nav-link.active { color:var(--gold-soft); }

.logo {
  cursor:pointer; text-decoration:none; display:inline-block;
  transition:opacity .4s;
}
.logo:hover { opacity:.85; }
.nav-logo {
  font-family:'Open Sans',sans-serif; font-weight:600;
  font-size:26px; letter-spacing:.5px; color:var(--beige-soft);
  text-shadow:0 1px 8px rgba(0,0,0,.2);
}
.nav-logo .ai { color:var(--gold); }
.nav-logo .media {
  font-weight:300; color:var(--beige-soft); opacity:.7;
  margin-left:5px; font-size:22px;
}
.nav.scrolled .nav-logo { font-size:22px; }
.nav.scrolled .nav-logo .media { font-size:18px; }
.logo img {
  height:67px; width:auto;
  filter:drop-shadow(0 1px 6px rgba(0,0,0,.3)) brightness(1.4);
}
.nav.scrolled .logo img {
  height:60px;
  filter:drop-shadow(0 1px 6px rgba(0,0,0,.3)) brightness(1.45);
}

.nav-links { display:flex; align-items:center; gap:32px; }
.nav-link {
  background:none; border:none; cursor:pointer;
  color:rgba(250,245,236,.75); font-family:'Inter',sans-serif;
  font-weight:300; font-size:13px; letter-spacing:.8px;
  text-transform:uppercase; transition:all .3s; padding:0;
}
.nav-link:hover, .nav-link.active { color:var(--cream); }
.lang-switch {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
  border-radius:24px; color:var(--cream); padding:6px 16px;
  cursor:pointer; font-family:'Inter',sans-serif; font-weight:400;
  font-size:12px; letter-spacing:1px; transition:all .3s;
}
.nav.scrolled .lang-switch {
  background:rgba(201,153,77,.12); border-color:rgba(201,153,77,.25); color:var(--gold-soft);
}
.hamburger {
  display:none; background:none; border:none;
  color:var(--cream); font-size:24px; cursor:pointer; transition:color .4s;
}
.nav.scrolled .hamburger { color:var(--cream); }
.mobile-menu {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(42,58,48,.97); backdrop-filter:blur(20px);
  z-index:199; flex-direction:column; justify-content:center;
  align-items:center; gap:24px;
}
.mobile-menu.open { display:flex; }
.mobile-menu .nav-link { color:var(--cream); font-size:18px; letter-spacing:2px; }
.mobile-menu .close-btn {
  position:absolute; top:24px; right:40px; background:none;
  border:none; color:var(--cream); font-size:28px; cursor:pointer;
}

@media(max-width:900px) {
  .nav-links { display:none !important; }
  .hamburger { display:block !important; }
  .nav { padding:16px 24px; }
}

/* ─── HERO (NVIDIA-inspired) ─── */
.hero {
  position:relative; min-height:100vh; display:flex;
  align-items:center; overflow:hidden;
}
.hero-bg {
  position:absolute; inset:0; z-index:0;
}
.hero-bg img {
  width:100%; height:100%; object-fit:cover;
  animation:kenBurns 20s ease-in-out infinite alternate;
}
@keyframes kenBurns {
  0% { transform:scale(1) translate(0,0); }
  100% { transform:scale(1.08) translate(-1%,-1%); }
}
.hero-overlay {
  position:absolute; inset:0; z-index:1;
  background:linear-gradient(105deg,
    rgba(42,58,48,.82) 0%,
    rgba(42,58,48,.65) 35%,
    rgba(42,58,48,.18) 60%,
    transparent 75%
  );
}
.hero-frost {
  position:absolute; left:0; top:0; bottom:0; width:55%; z-index:2;
  backdrop-filter:blur(30px) saturate(1.2);
  -webkit-backdrop-filter:blur(30px) saturate(1.2);
  mask-image:linear-gradient(to right, black 70%, transparent 100%);
  -webkit-mask-image:linear-gradient(to right, black 70%, transparent 100%);
}
.hero-content {
  position:relative; z-index:3;
  max-width:600px; padding:0 60px; margin-top:40px;
}
.hero-tagline {
  font-weight:300; font-size:12px; color:var(--gold-soft);
  letter-spacing:5px; text-transform:uppercase; margin-bottom:28px;
  opacity:0; animation:fadeUp .8s ease .3s forwards;
}
.hero h1 {
  font-family:'Open Sans',sans-serif; font-weight:300;
  font-size:clamp(36px,4.5vw,54px); color:var(--cream);
  line-height:1.15; margin-bottom:20px; letter-spacing:-.5px;
  opacity:0; animation:fadeUp .8s ease .5s forwards;
}
.hero-sub {
  font-size:17px; color:var(--beige); line-height:1.7;
  margin-bottom:40px; font-weight:200;
  opacity:0; animation:fadeUp .8s ease .7s forwards;
}
.hero-buttons {
  display:flex; gap:16px; flex-wrap:wrap;
  opacity:0; animation:fadeUp .8s ease .9s forwards;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to { opacity:1; transform:translateY(0); }
}

@media(max-width:900px) {
  .hero-content { padding:0 24px; max-width:100%; }
  .hero-frost { width:100%; mask-image:none; -webkit-mask-image:none; }
  .hero-overlay { background:rgba(42,58,48,.7); }
}

/* ─── BUTTONS ─── */
.btn-primary {
  background:linear-gradient(135deg, var(--gold-soft), var(--gold-muted));
  color:var(--white); border:none; padding:15px 34px; border-radius:4px;
  cursor:pointer; font-family:'Inter',sans-serif; font-weight:400;
  font-size:14px; letter-spacing:.8px; transition:all .4s;
}
.btn-primary:hover { filter:brightness(1.08); transform:translateY(-1px); }
.btn-ghost {
  background:transparent; color:var(--cream); border:1px solid rgba(250,245,236,.3);
  padding:15px 34px; border-radius:4px; cursor:pointer;
  font-family:'Inter',sans-serif; font-weight:300;
  font-size:14px; letter-spacing:.8px; transition:all .4s;
}
.btn-ghost:hover { background:rgba(250,245,236,.08); border-color:rgba(250,245,236,.5); }
.btn-dark {
  background:var(--forest); color:var(--cream); border:none;
  padding:15px 34px; border-radius:4px; cursor:pointer;
  font-family:'Inter',sans-serif; font-weight:400;
  font-size:14px; letter-spacing:.8px; transition:all .4s;
}
.btn-dark:hover { background:var(--forest-deep); }

/* ─── PHOTO SECTIONS (Leeroy-inspired) ─── */
.photo-section {
  position:relative; min-height:60vh; display:flex;
  align-items:center; justify-content:center; overflow:hidden;
}
.photo-section .bg {
  position:absolute; inset:0;
}
.photo-section .bg img {
  width:100%; height:100%; object-fit:cover;
  transition:transform 8s ease;
}
.photo-section:hover .bg img { transform:scale(1.03); }
.photo-section .overlay {
  position:absolute; inset:0;
  background:rgba(42,58,48,.45);
}
.photo-section .content {
  position:relative; z-index:2; text-align:center;
  max-width:700px; padding:80px 24px;
}
.photo-section .content h2 {
  font-family:'Open Sans',sans-serif; font-weight:300;
  font-size:clamp(28px,3.5vw,42px); color:var(--cream);
  margin-bottom:16px; letter-spacing:-.3px;
}
.photo-section .content p {
  font-size:17px; color:var(--beige); line-height:1.8;
  font-weight:200;
}

/* ─── MEDIA SPLIT BACKGROUND ─── */
.media-bg-split {
  display:flex; width:100%; height:100%;
}
.media-bg-split .media-bg-left {
  width:66%; height:100%; object-fit:cover; object-position:left center;
}
.media-bg-split .media-bg-right {
  width:34%; height:100%; object-fit:cover; object-position:center center;
}
@media(max-width:900px) {
  .media-bg-split .media-bg-left { width:100%; }
  .media-bg-split .media-bg-right { display:none; }
}

/* ─── PARALLAX IMAGE BAND ─── */
.parallax-band {
  height:45vh; overflow:hidden; position:relative;
}
.parallax-band img {
  width:100%; height:130%; object-fit:cover;
  position:absolute; top:-15%;
  will-change:transform;
}

/* ─── TEXT SECTIONS ─── */
.text-section {
  padding:120px 24px; background:var(--cream);
}
.text-section.dark {
  background:var(--forest-deep); color:var(--cream);
}
.text-section .container {
  max-width:900px; margin:0 auto;
}
.section-label {
  font-size:11px; font-weight:400; letter-spacing:4px;
  text-transform:uppercase; color:var(--gold-soft); margin-bottom:20px;
}
.section-title {
  font-family:'Open Sans',sans-serif; font-weight:300;
  font-size:clamp(30px,3.5vw,44px); line-height:1.15;
  letter-spacing:-.5px; margin-bottom:24px;
}
.section-text {
  font-size:17px; line-height:1.9; font-weight:200; opacity:.85;
  max-width:700px;
}
.dark .section-text { color:var(--beige); }

/* ─── SERVICES ─── */
.services-list { margin-top:48px; }
.service-item {
  display:flex; gap:28px; padding:32px 0;
  border-bottom:1px solid rgba(42,58,48,.08);
  align-items:flex-start;
  opacity:0; transform:translateY(20px);
  transition:all .6s ease;
}
.service-item.visible { opacity:1; transform:translateY(0); }
.dark .service-item { border-bottom-color:rgba(250,245,236,.08); }
.service-num {
  font-family:'Open Sans',sans-serif; font-weight:200;
  font-size:42px; color:var(--gold-soft); opacity:.35;
  min-width:60px; line-height:1;
}
.service-name {
  font-family:'Open Sans',sans-serif; font-weight:400;
  font-size:20px; margin-bottom:6px;
}
.service-desc {
  font-size:15px; line-height:1.7; opacity:.7; font-weight:200;
}

/* ─── FOUNDER (split layout) ─── */
.founder-split {
  display:grid; grid-template-columns:1fr 1fr;
  min-height:80vh;
}
.founder-photo {
  position:relative; overflow:hidden;
}
.founder-photo img {
  width:100%; height:100%; object-fit:cover;
  animation:kenBurnsSlow 30s ease-in-out infinite alternate;
}
@keyframes kenBurnsSlow {
  0% { transform:scale(1); }
  100% { transform:scale(1.06); }
}
.founder-info {
  display:flex; flex-direction:column; justify-content:center;
  padding:80px 60px; background:var(--cream-soft);
}
.founder-info h3 {
  font-family:'Open Sans',sans-serif; font-weight:600;
  font-size:28px; color:var(--forest); margin-bottom:4px;
}
.founder-info .role {
  font-size:15px; color:var(--gold); margin-bottom:28px;
  letter-spacing:.5px;
}
.founder-info .bio {
  font-size:16px; line-height:1.85; color:var(--forest);
  opacity:.8; font-weight:200; margin-bottom:36px;
}

@media(max-width:900px) {
  .founder-split { grid-template-columns:1fr; }
  .founder-photo { height:50vh; }
  .founder-info { padding:48px 24px; }
}

/* ─── PLATFORMS GRID ─── */
.platforms-grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:0; margin-top:60px;
}
.platform-item {
  padding:48px 24px; text-align:center;
  border-right:1px solid rgba(53,74,64,.08);
  transition:background .4s;
}
.platform-item:last-child { border-right:none; }
.platform-item:hover { background:rgba(53,74,64,.04); }
.platform-icon { font-size:32px; margin-bottom:16px; opacity:.7; }
.platform-name {
  font-family:'Open Sans',sans-serif; font-weight:400;
  font-size:16px; color:var(--forest); margin-bottom:8px;
}
.platform-status {
  font-size:12px; color:var(--gold); letter-spacing:1px;
  text-transform:uppercase; font-weight:400;
}

@media(max-width:768px) {
  .platforms-grid { grid-template-columns:1fr 1fr; }
  .platform-item { border-bottom:1px solid rgba(53,74,64,.08); }
}

/* ─── PARTNER ─── */
.partner-card {
  display:flex; gap:28px; align-items:center;
  padding:36px; border-radius:8px;
  background:var(--white); border:1px solid var(--beige);
  max-width:600px; margin-top:40px;
}
.partner-avatar {
  width:80px; height:80px; border-radius:50%; flex-shrink:0;
  background:rgba(93,126,114,.1);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; color:var(--forest); opacity:.5;
}
.partner-name { font-weight:500; font-size:18px; color:var(--forest); }
.partner-role { font-size:13px; color:var(--gold); margin:4px 0; }
.partner-desc { font-size:13px; color:var(--teal); opacity:.8; }

/* ─── DIAGNOSTIC CTA ─── */
.diag-section {
  text-align:center; padding:100px 24px;
  background:linear-gradient(160deg, var(--cream-soft), rgba(200,221,211,.2));
}
.diag-card {
  max-width:480px; margin:40px auto 0;
  background:var(--white); border-radius:12px;
  padding:48px 40px; box-shadow:0 20px 60px rgba(42,58,48,.06);
  border:1px solid rgba(214,204,191,.3);
}
.diag-icon {
  width:72px; height:72px; margin:0 auto 20px;
  display:flex; align-items:center; justify-content:center;
}
.diag-icon svg { width:100%; height:100%; }
.diag-card p { font-size:15px; line-height:1.7; color:var(--teal); margin-bottom:28px; }
.diag-time { font-size:12px; color:var(--warm-gray); margin-top:16px; }

/* ─── QUIZ DIAGNOSTIC ─── */
.quiz-progress {
  width:100%; height:6px; background:var(--beige); border-radius:3px;
  margin-bottom:12px; overflow:hidden;
}
.quiz-progress-bar {
  height:100%; width:0; background:linear-gradient(90deg,var(--sage),var(--gold));
  border-radius:3px; transition:width .5s cubic-bezier(.22,1,.36,1);
}
.quiz-counter {
  font-size:12px; color:var(--warm-gray); letter-spacing:1px; margin-bottom:8px;
}
.quiz-dimension {
  font-size:11px; font-weight:400; letter-spacing:3px; text-transform:uppercase;
  color:var(--gold); margin-bottom:20px;
}
.quiz-question {
  font-family:'Open Sans',sans-serif; font-weight:400; font-size:18px;
  line-height:1.6; color:var(--forest); margin-bottom:24px;
  animation:fadeUp .4s ease forwards;
}
.quiz-options { display:flex; flex-direction:column; gap:10px; }
.quiz-opt {
  background:var(--white); border:2px solid var(--beige); border-radius:10px;
  padding:14px 18px; font-size:14px; line-height:1.5; color:var(--forest);
  cursor:pointer; transition:all .3s; text-align:left; font-family:'Inter',sans-serif;
  font-weight:300; animation:fadeUp .4s ease forwards;
  opacity:0;
}
.quiz-opt:nth-child(1) { animation-delay:.05s; }
.quiz-opt:nth-child(2) { animation-delay:.1s; }
.quiz-opt:nth-child(3) { animation-delay:.15s; }
.quiz-opt:nth-child(4) { animation-delay:.2s; }
.quiz-opt:hover { border-color:var(--sage); background:rgba(200,221,211,.15); }
.quiz-opt.selected { border-color:var(--gold); background:rgba(201,153,77,.08); }
.quiz-nav { display:flex; justify-content:flex-start; margin-top:20px; }
.quiz-back {
  opacity:.5; font-size:18px; padding:8px 16px;
}
.quiz-back:hover { opacity:1; }

/* Results */
.result-score-ring { width:180px; height:180px; margin:24px auto; }
.score-svg { width:100%; height:100%; }
.score-num { font-family:'Open Sans',sans-serif; font-weight:300; font-size:42px; fill:var(--forest); }
.score-label { font-family:'Inter',sans-serif; font-weight:200; font-size:16px; fill:var(--warm-gray); }
.result-level {
  text-align:center; font-size:22px; font-family:'Open Sans',sans-serif;
  font-weight:400; color:var(--gold); margin-bottom:12px;
}
.result-desc {
  font-size:15px; line-height:1.7; color:var(--forest); text-align:center;
  max-width:520px; margin:0 auto 32px; font-weight:300;
}
.radar-wrap { margin:0 auto 32px; max-width:320px; }
.radar-svg { width:100%; }
.dim-bars { margin-bottom:32px; }
.dim-bar-row { margin-bottom:14px; }
.dim-bar-label {
  font-size:12px; font-weight:400; color:var(--forest); margin-bottom:4px;
  display:flex; justify-content:space-between;
}
.dim-bar-track {
  height:8px; background:var(--beige); border-radius:4px; overflow:hidden;
}
.dim-bar-fill {
  height:100%; border-radius:4px; width:0;
  background:linear-gradient(90deg,var(--sage),var(--gold));
  transition:width 1s cubic-bezier(.22,1,.36,1);
}
.result-reco {
  font-size:14px; line-height:1.6; color:var(--teal); text-align:center;
  font-style:italic; margin-bottom:8px; font-weight:300;
}

/* ─── EMAIL RESULTS BOX ─── */
.email-results-box {
  background:var(--white); border:1px solid var(--beige); border-radius:12px;
  padding:20px 24px; margin:28px auto; max-width:480px; text-align:center;
}
.email-check-label {
  display:flex; align-items:center; justify-content:center; gap:10px;
  cursor:pointer; font-size:14px; color:var(--forest); font-weight:300;
}
.email-check-label input[type="checkbox"] {
  width:18px; height:18px; accent-color:var(--gold);
}
.email-field-wrap {
  margin-top:14px; display:flex; gap:10px; align-items:center; justify-content:center;
}
.email-input {
  flex:1; max-width:280px; padding:10px 14px; border:1px solid var(--beige);
  border-radius:8px; font-family:'Inter',sans-serif; font-size:14px;
  font-weight:300; color:var(--forest); background:var(--cream-soft);
  outline:none; transition:border-color .3s;
}
.email-input:focus { border-color:var(--gold); }
.email-status {
  font-size:12px; color:var(--sage); margin-top:8px; min-height:16px;
}

/* ─── CONTACT ─── */
.contact-split {
  display:grid; grid-template-columns:1fr 1fr; min-height:80vh;
}
.contact-photo { position:relative; overflow:hidden; }
.contact-photo img {
  width:100%; height:100%; object-fit:cover; object-position:center 40%;
  animation:kenBurnsSlow 25s ease-in-out infinite alternate;
}
.contact-form-side {
  display:flex; flex-direction:column; justify-content:center;
  padding:80px 60px; background:var(--cream);
}
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:32px; }
.chip {
  padding:8px 18px; border-radius:24px; cursor:pointer;
  border:1px solid var(--beige); background:transparent;
  color:var(--forest); font-family:'Inter',sans-serif;
  font-weight:300; font-size:13px; transition:all .3s;
}
.chip:hover { border-color:var(--gold-soft); }
.chip.selected { background:var(--gold-soft); color:var(--white); border-color:var(--gold-soft); }

window.addEventListener("scroll",()=>{
  const n=document.getElementById("navbar");
  window.scrollY>60?n.classList.add("scrolled"):n.classList.remove("scrolled");
  // Parallax
  document.querySelectorAll(".parallax-band img").forEach(img=>{
    const r=img.parentElement.getBoundingClientRect();
    if(r.bottom>0&&r.top<window.innerHeight){
      const pct=(r.top/window.innerHeight);
      img.style.transform=`translateY(${pct*40}px)`;
    }
  });
});

function initObserver(){
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");obs.unobserve(e.target);}});
  },{threshold:.1});
  document.querySelectorAll(".reveal:not(.visible),.service-item:not(.visible)").forEach(el=>obs.observe(el));
}

let quizAnswers=new Array(15).fill(-1), quizCurrent=0;

function startDiag(){
  document.getElementById("diagIntro").style.display="none";
  document.getElementById("diagQuiz").style.display="block";
  quizAnswers.fill(-1); quizCurrent=0;
  renderQ();
}

function renderQ(){
  const q=quizCurrent, l=lang;
  const dimIdx=Math.floor(q/3);
  document.getElementById("quizBar").style.width=((q/15)*100)+"%";
  document.getElementById("quizCounter").textContent=`${q+1} ${QData.ui[l].of} 15`;
  document.getElementById("quizDim").textContent=QData.dims[l][dimIdx];
  document.getElementById("quizQ").textContent=QData.questions[l][q];
  document.getElementById("quizBack").style.visibility=q>0?"visible":"hidden";
  let oh="";
  QData.options[l][q].forEach((opt,i)=>{
    const sel=quizAnswers[q]===i?"selected":"";
    oh+=`<div class="quiz-opt ${sel}" onclick="pickOpt(${i})">${opt}</div>`;
  });
  document.getElementById("quizOpts").innerHTML=oh;
}

function pickOpt(i){
  quizAnswers[quizCurrent]=i;
  document.querySelectorAll(".quiz-opt").forEach((el,idx)=>{
    el.classList.toggle("selected",idx===i);
  });
  setTimeout(()=>{
    if(quizCurrent<14){ quizCurrent++; renderQ(); }
    else { showResults(); }
  },350);
}

function prevQ(){
  if(quizCurrent>0){ quizCurrent--; renderQ(); }
}

function showResults(){
  document.getElementById("diagQuiz").style.display="none";
  document.getElementById("diagResults").style.display="block";
  const l=lang;
  const total=quizAnswers.reduce((s,v)=>s+(v+1),0);
  const dimScores=[];
  for(let d=0;d<5;d++){
    dimScores.push((quizAnswers[d*3]+1)+(quizAnswers[d*3+1]+1)+(quizAnswers[d*3+2]+1));
  }
  let lvl=0;
  if(total>=25) lvl=1; if(total>=37) lvl=2; if(total>=49) lvl=3;

  document.getElementById("resTitle").textContent=QData.ui[l].title;
  document.getElementById("resLevel").textContent=QData.levels[l][lvl].name;
  document.getElementById("resDesc").textContent=QData.levels[l][lvl].desc;
  document.getElementById("resReco").textContent=QData.levels[l][lvl].reco;
  document.getElementById("resDimTitle").textContent=QData.ui[l].dimTitle;
  document.getElementById("resCta").textContent=QData.ui[l].cta;
  document.getElementById("resPDF").textContent=QData.ui[l].pdf;
  document.getElementById("resReset").textContent=QData.ui[l].reset;

  // Animate score circle
  const circle=document.getElementById("scoreCircle");
  const pct=total/60;
  const offset=534-(534*pct);
  setTimeout(()=>{ circle.style.transition="stroke-dashoffset 1.5s cubic-bezier(.22,1,.36,1)"; circle.style.strokeDashoffset=offset; },100);

  // Animate score number
  let count=0;
  const numEl=document.getElementById("scoreNum");

function drawRadar(scores,l){
  const cx=150,cy=130,r=100,dims=5;
  const angles=scores.map((_,i)=>(Math.PI*2*i/dims)-(Math.PI/2));
  // Grid
  let svg="";
  [.25,.5,.75,1].forEach(s=>{
    let pts=angles.map(a=>`${cx+r*s*Math.cos(a)},${cy+r*s*Math.sin(a)}`).join(" ");
    svg+=`<polygon points="${pts}" fill="none" stroke="var(--beige)" stroke-width="1"/>`;
  });
  // Axis lines
  angles.forEach(a=>{
    svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="var(--beige)" stroke-width="1"/>`;
  });
  // Labels
  const labels=QData.dims[l].map(n=>n.length>18?n.substring(0,16)+"…":n);
  angles.forEach((a,i)=>{
    const lx=cx+(r+22)*Math.cos(a), ly=cy+(r+22)*Math.sin(a);
    const anchor=Math.abs(Math.cos(a))<.1?"middle":Math.cos(a)>0?"start":"end";
    svg+=`<text x="${lx}" y="${ly}" text-anchor="${anchor}" font-size="8" fill="var(--forest)" font-family="Inter" font-weight="300">${labels[i]}</text>`;
  });
  // Data polygon
  const dataPts=scores.map((s,i)=>{
    const pct=s/12;
    return `${cx+r*pct*Math.cos(angles[i])},${cy+r*pct*Math.sin(angles[i])}`;
  }).join(" ");
  svg+=`<polygon points="${dataPts}" fill="rgba(201,153,77,.15)" stroke="var(--gold)" stroke-width="2" class="radar-data"/>`;
  // Data dots
  scores.forEach((s,i)=>{
    const pct=s/12;
    svg+=`<circle cx="${cx+r*pct*Math.cos(angles[i])}" cy="${cy+r*pct*Math.sin(angles[i])}" r="4" fill="var(--gold)"/>`;
  });
  document.getElementById("radarSvg").innerHTML=svg;
}

// ─── PDF GENERATION ───
function downloadDiagPDF(){
  const l=lang;
  const total=quizAnswers.reduce((s,v)=>s+(v+1),0);
  const dimScores=[];
  for(let d=0;d<5;d++){
    dimScores.push((quizAnswers[d*3]+1)+(quizAnswers[d*3+1]+1)+(quizAnswers[d*3+2]+1));
  }
  let lvl=0;
  if(total>=25) lvl=1; if(total>=37) lvl=2; if(total>=49) lvl=3;
  const dims=QData.dims[l];
  const level=QData.levels[l][lvl];

  // Create PDF using jsPDF
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const w=210, margin=20;

  // Header bar
  doc.setFillColor(42,58,48);
  doc.rect(0,0,w,38,  'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(22);
  doc.setTextColor(232,224,212);
  doc.text('StratAIgist Media',margin,18);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(201,153,77);
  doc.text(l==='fr'?'Diagnostic IA préliminaire':'Preliminary AI Diagnostic',margin,28);

  // Score section
  let y=52;
  doc.setTextColor(42,58,48);
  doc.setFont('helvetica','bold');
  doc.setFontSize(14);
  doc.text(l==='fr'?'Votre score':'Your Score',margin,y);
  y+=10;

  // Score circle (simplified as text)
  doc.setFontSize(36);
  doc.setTextColor(201,153,77);
  doc.text(total+'/60',margin,y+12);
  doc.setFontSize(13);
  doc.setTextColor(93,126,114);
  doc.text(level.name.replace(/[^\w\s\u00C0-\u024F—]/g,''),margin+45,y+4);
  y+=22;

  // Level description
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(60,60,60);
  const descLines=doc.splitTextToSize(level.desc,w-2*margin);
  doc.text(descLines,margin,y);
  y+=descLines.length*5+8;

  // Dimension scores
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(42,58,48);
  doc.text(l==='fr'?'Score par dimension':'Score by Dimension',margin,y);
  y+=8;

  dims.forEach((name,i)=>{
    const score=dimScores[i];
    const pct=score/12;
    // Bar background
    doc.setFillColor(221,212,198);
    doc.roundedRect(margin,y,120,6,2,2,'F');
    // Bar fill
    if(pct>.5) doc.setFillColor(201,153,77);
    else doc.setFillColor(122,158,142);
    doc.roundedRect(margin,y,120*pct,6,2,2,'F');
    // Label
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(42,58,48);
    doc.text(name,margin,y-2);
    doc.text(score+'/12',margin+122,y+4);
    y+=14;
  });

  // Recommendation
  y+=4;
  doc.setFillColor(250,245,236);
  doc.roundedRect(margin-2,y-4,w-2*margin+4,24,3,3,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(42,58,48);
  doc.text(l==='fr'?'Recommandation :':'Recommendation:',margin,y+2);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(60,60,60);
  const recoLines=doc.splitTextToSize(level.reco,w-2*margin-4);
  doc.text(recoLines,margin,y+9);
  y+=32;

  // CTA
  doc.setFillColor(201,153,77);
  doc.roundedRect(margin,y,w-2*margin,14,4,4,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(255,255,255);
  const ctaText=l==='fr'?'Planifier une conversation':'Book a conversation';
  const ctaW=doc.getTextWidth(ctaText);
  doc.text(ctaText,(w-ctaW)/2,y+9);
  doc.link(margin,y,w-2*margin,14,{url:'https://cal.com/strataigist'});
  y+=22;

  // Footer
  doc.setDrawColor(221,212,198);
  doc.line(margin,y,w-margin,y);
  y+=6;
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(140,140,140);
  doc.text('strataigistmedia.com | info@strataigistmedia.com | cal.com/strataigist',margin,y);
  doc.text(l==='fr'?'© 2026 StratAIgist Media. Tous droits réservés.':'© 2026 StratAIgist Media. All rights reserved.',margin,y+4);

  // Safari-friendly download
  const pdfBlob=doc.output('blob');
  const url=URL.createObjectURL(pdfBlob);
  const a=document.createElement('a');
  a.href=url;
  a.download=l==='fr'?'Diagnostic-IA-StratAIgist.pdf':'AI-Diagnostic-StratAIgist.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),100);
}
